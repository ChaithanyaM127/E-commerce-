<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roselle - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f7f7f7;

}


.login-container{

width:350px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
text-align:center;

}



.logo{

font-size:35px;
font-weight:bold;
color:#e91e63;
margin-bottom:20px;

}



input{

width:100%;
padding:13px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;

}



button{

width:100%;
padding:13px;
background:#e91e63;
color:white;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
margin-top:10px;

}



button:hover{

background:#c2185b;

}



a{

color:#e91e63;
text-decoration:none;

}



p{

margin-top:15px;

}



</style>

</head>


<body>


<div class="login-container">


<div class="logo">
Roselle
</div>


<h2>
Login
</h2>



<input 
type="email"
id="email"
placeholder="Email or Mobile Number">



<input 
type="password"
id="password"
placeholder="Password">



<button onclick="login()">
Login
</button>



<p>
Forgot Password?
</p>



<p>
New to Roselle?
<a href="signup.html">
Create Account
</a>
</p>


</div>





<script>


function login(){


let user =
JSON.parse(
localStorage.getItem("roselleUser")
);



let email =
document.getElementById("email").value;



let password =
document.getElementById("password").value;




if(user && 
user.email === email &&
user.password === password){



localStorage.setItem(
"loggedIn",
"true"
);



alert(
"Login Successful"
);



window.location.href="index.html";


}


else{


alert(
"Invalid email or password"
);


}



}



</script>


</body>

</html>
