<!DOCTYPE html>
<html>

<head>

<title>
Roselle Cart
</title>


<style>

body{

font-family:Arial;

background:#f5f5f5;

padding:30px;

}


h1{

text-align:center;

color:#e91e63;

}



.cart-box{

background:white;

padding:20px;

margin:20px auto;

max-width:700px;

border-radius:15px;

}



.item{

display:flex;

justify-content:space-between;

align-items:center;

padding:15px;

border-bottom:1px solid #ddd;

}



button{

padding:8px 15px;

border:none;

background:#e91e63;

color:white;

border-radius:20px;

cursor:pointer;

}



.total{

font-size:25px;

font-weight:bold;

text-align:right;

margin-top:20px;

}


</style>

</head>


<body>


<h1>
🛒 My Cart
</h1>



<div class="cart-box" id="cartItems">


</div>



<div class="total" id="total">

</div>



<script>


let cart = JSON.parse(localStorage.getItem("cart")) || [];



function displayCart(){


let box=document.getElementById("cartItems");


box.innerHTML="";


let total=0;



cart.forEach((item,index)=>{


total += item.price * item.quantity;



box.innerHTML += `


<div class="item">


<div>

<h3>${item.name}</h3>

<p>
₹${item.price}
</p>


</div>



<div>


<button onclick="changeQty(${index},-1)">
-
</button>


${item.quantity}


<button onclick="changeQty(${index},1)">
+
</button>


<button onclick="removeItem(${index})">
Remove
</button>


</div>


</div>


`;



});



document.getElementById("total").innerHTML=

"Total: ₹"+total;



localStorage.setItem(
"cart",
JSON.stringify(cart)
);



}



function changeQty(index,value){


cart[index].quantity += value;


if(cart[index].quantity<=0){

cart[index].quantity=1;

}


displayCart();


}



function removeItem(index){


cart.splice(index,1);


displayCart();


}



displayCart();



</script>



</body>

</html>
