<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roselle - My Account</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:#f5f5f5;

}



header{

background:white;

padding:20px;

display:flex;

justify-content:space-between;

align-items:center;

box-shadow:0 2px 10px #ddd;

}



.logo{

font-size:32px;

font-weight:bold;

color:#e91e63;

}



header a{

text-decoration:none;

color:#333;

margin-left:20px;

}



.container{

display:flex;

gap:25px;

padding:40px;

}



.sidebar{

background:white;

width:250px;

padding:25px;

border-radius:15px;

}



.sidebar h3{

margin-bottom:20px;

}



.sidebar p{

padding:12px;

cursor:pointer;

border-bottom:1px solid #eee;

}



.profile{

background:white;

flex:1;

padding:30px;

border-radius:15px;

}



.profile h2{

color:#e91e63;

margin-bottom:20px;

}



.info{

background:#fafafa;

padding:20px;

border-radius:10px;

}



button{

margin-top:20px;

padding:12px 25px;

background:#e91e63;

color:white;

border:none;

border-radius:25px;

cursor:pointer;

}



@media(max-width:700px){


.container{

flex-direction:column;

padding:20px;

}


.sidebar{

width:100%;

}


}


</style>

</head>



<body>



<header>


<div class="logo">
Roselle
</div>



<div>

<a href="index.html">
Home
</a>


<a href="cart.html">
🛒 Cart
</a>


</div>


</header>






<div class="container">



<div class="sidebar">


<h3>
My Account
</h3>


<p>
👤 Profile
</p>


<p>
📦 My Orders
</p>


<p>
❤️ Wishlist
</p>


<p>
📍 Address
</p>


<p>
💳 Payments
</p>



</div>







<div class="profile">


<h2>
My Profile
</h2>



<div class="info" id="userInfo">


</div>



<button onclick="logout()">

Logout

</button>



</div>



</div>








<script>


let user = 
JSON.parse(
localStorage.getItem("roselleUser")
);



if(user){


document.getElementById("userInfo").innerHTML = `


<h3>
${user.name}
</h3>

<br>


<p>
📱 Mobile : ${user.mobile}
</p>


<p>
📧 Email : ${user.email}
</p>


<br>


<p>
Orders : 0
</p>


<p>
Wishlist Items : 0
</p>



`;


}

else{


document.getElementById("userInfo").innerHTML=

`

<h3>
Please Login First
</h3>

<a href="login.html">
Login Now
</a>

`;

}





function logout(){


localStorage.removeItem("loggedIn");


localStorage.removeItem("roselleUser");


alert(
"Logged out successfully"
);



window.location.href="index.html";


}



</script>



</body>

</html>
