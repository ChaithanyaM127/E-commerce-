<!DOCTYPE html>
<html>

<head>

<title>
Roselle Wishlist
</title>


<style>

body{

font-family:Arial;

background:#f7f7f7;

padding:30px;

}


h1{

text-align:center;

color:#e91e63;

}


.wishlist{

background:white;

max-width:600px;

margin:auto;

padding:20px;

border-radius:15px;

}


.item{

display:flex;

justify-content:space-between;

align-items:center;

padding:15px;

border-bottom:1px solid #ddd;

}


button{

background:#e91e63;

color:white;

border:none;

padding:10px 15px;

border-radius:20px;

cursor:pointer;

}


</style>


</head>



<body>


<h1>
❤️ My Wishlist
</h1>



<div class="wishlist" id="wishlist">


</div>




<script>


let wishlist = 
JSON.parse(
localStorage.getItem("wishlist")
) || [];



function showWishlist(){


let box =
document.getElementById("wishlist");


box.innerHTML="";



wishlist.forEach((item,index)=>{


box.innerHTML += `


<div class="item">


<div>

<h3>
${item.name}
</h3>


<p>
₹${item.price}
</p>


</div>



<button onclick="removeWishlist(${index})">

Remove

</button>



</div>


`;


});


}



function removeWishlist(index){


wishlist.splice(index,1);



localStorage.setItem(

"wishlist",

JSON.stringify(wishlist)

);



showWishlist();


}



showWishlist();



</script>



</body>

</html>
