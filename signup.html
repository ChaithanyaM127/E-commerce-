<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roselle - Signup</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f7f7f7;

}



.signup-container{

width:380px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
text-align:center;

}



.logo{

font-size:35px;
font-weight:bold;
color:#e91e63;
margin-bottom:20px;

}



input{

width:100%;
padding:13px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px;

}



button{

width:100%;
padding:13px;
margin-top:15px;

background:#e91e63;

color:white;

border:none;

border-radius:25px;

font-size:16px;

cursor:pointer;

}



button:hover{

background:#c2185b;

}



a{

color:#e91e63;
text-decoration:none;

}



p{

margin-top:15px;

}



</style>


</head>


<body>



<div class="signup-container">



<div class="logo">
Roselle
</div>


<h2>
Create Account
</h2>



<input 
type="text"
id="name"
placeholder="Full Name">



<input 
type="text"
id="mobile"
placeholder="Mobile Number">



<input 
type="email"
id="email"
placeholder="Email Address">



<input 
type="password"
id="password"
placeholder="Create Password">



<input 
type="password"
id="confirmPassword"
placeholder="Confirm Password">





<button onclick="signup()">

Create Account

</button>




<p>

Already have an account?

<a href="login.html">
Login
</a>

</p>



</div>







<script>



function signup(){



let name =
document.getElementById("name").value;



let mobile =
document.getElementById("mobile").value;



let email =
document.getElementById("email").value;



let password =
document.getElementById("password").value;



let confirmPassword =
document.getElementById("confirmPassword").value;





if(
name=="" ||
mobile=="" ||
email=="" ||
password==""
){


alert(
"Please fill all details"
);


return;


}




if(password !== confirmPassword){


alert(
"Passwords do not match"
);


return;


}




let user={


name:name,

mobile:mobile,

email:email,

password:password


};





localStorage.setItem(

"roselleUser",

JSON.stringify(user)

);





alert(

"Account created successfully 🎉"

);





window.location.href="login.html";



}



</script>



</body>

</html>
